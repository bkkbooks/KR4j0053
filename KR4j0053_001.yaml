body:
  text: 竹山詞宋蔣捷撰賀新郎秋曉渺渺啼鴉了亘魚天寒生峭嶼五湖秋曉竹几一鐙人做夢嘶馬誰行古道起搔首窺星多少月有微黃籬無影挂牽牛數朵青花小秋太淡添紅棗愁痕倚賴西風掃被西風翻催鬢鬒與秋俱老舊院隔霜簾不捲金粉屏邊醉倒計無此中年懷抱萬里江南吹簫恨恨參差白雁橫天杪煙未斂楚山杳又約友三月旦飲雁嶼晴嵐薄倚層屏千樹髙低粉纖紅弱雲隘東風藏不盡吹豔生香萬壑又散入汀蘅洲藥擾擾囱囱塵土面看歌鶯舞燕逢春樂人共物知誰錯寶叉樓上圍簾幕小嬋娟雙調彈箏半霄鸞鶮我輩中人無此分琴思詩情當却也勝似愁橫眉角芳景三分才過二便緑隂門巷楊花落沽斗酒且同酌又吳江浪湧孤亭起是當年蓬萊頂上海風飄墜帝遣江神長守護八柱蛟龍纒尾鬬吐出寒煙寒雨昨夜鯨翻神軸動卷雕翬擲向虛空裏但留得絳虹住五湖有客扁舟艤怕羣仙重游到此翠旌難駐手拍䦨干呼白鷺為我殷勤寄語奈鷺也驚飛沙渚星月一天雲萬壑覽茫茫宇宙知何處鼓雙楫浩歌去又懷舊夢冷黃金屋嘆秦箏斜鴻陳裏素絃塵撲化作嬌鶯飛歸去猶認紗窗舊緑正過雨荆桃如菽此恨難平君知否似瓊臺湧起彈棊局消瘦影嫌明燭鴛樓碎瀉東西玉問芳踪何時再展翠叉難卜待把宫眉橫雲樣描上生綃畫幅怕不是新來粧束綵扇紅牙今都在恨無人解聽開元曲空掩袖倚寒竹又兵後寓吳深閣簾垂繡記家人軟語燈邊笑渦紅透萬叠城頭哀怨角吹落霜花滿袖影厮伴東奔西走望斷鄉關知何處羡寒鴉到著黃昏後一㸃㸃歸楊栁相看只有山如舊歎浮雲本是無心也成蒼狗明日枯荷包冷飯又過前頭小阜趂未發且嘗村酒醉探枵囊毛錐在問鄰翁要寫牛經否翁不應但搖手沁園春為老人書南堂壁老子平生辛勤幾年始有此廬也學那陶潛籬栽些菊依他杜甫園種些蔬除了雕梁肻容紫燕誰管門前長者車怪近日把一庭明月却借伊渠鬢邊白髮紛如又何苦招賓納客歟但夏榻宵眠面風欹枕冬檐晝短背日觀書若有人尋只教僮道這屋主人今日居休羡彼有搖金寶轡織翠華裾又次强雲卿韵結算平生風流債負請一筆勾蓋攻性之兵花圍錦陳毒身之鴆笑齒歌喉豈識吾儒道中樂地絶勝珠簾十里樓因底嘆晴乾不去待雨淋頭休休著甚來由硬䥫漢從來氣食牛但只有千篇好詩好曲都無半㸃閒悶閒愁自古嬌波溺人多矣試問還能溺我不髙擡眼看牽絲傀儡誰弄誰收女冠子元夕蕙花香也雪晴池館如畫春風飛到寶叉樓上一片笙簫琉璃光射而今燈謾掛不是暗塵明月那時元夜况年來心懶意怯羞與蛾兒爭耍江城人悄初更打問繁華誰解再向天公借剔殘紅灺但夢裏隱隱鈿車羅帕吳箋銀粉砑待把舊家風景寫成閒話笑緑鬟鄰女綺窗猶唱夕陽西下又競渡電旗飛舞雙雙還又爭渡湘灕雲外獨醒何在翠藥紅蘅芳菲如故深衷全未語不似素車白馬卷潮起怒但悄然千載舊跡時有閒人弔古生平慣受椒蘭苦甚魄沉寒浪更被饞蛟妬結瓊紉璐料貝闕隱隱騎鯨煙霧楚妃花倚暮莫便玉簫吹了凌波同步待月明洲渚小留旌節朗吟騷賦大聖樂陶成之生日笙月涼邊翠翹雙舞夀仙曲破更聽得豔拍流星慢唱夀詞初了羣唱蓮歌主翁樓中披鶴氅展一笑微微紅透渦襟懷好縱炎官駐繖長是春和千年鼻祖事業記曾趂雷聲飛快梭但也曾三徑撫松採菊隨分吟哦冨貴浮雲榮華風過淡處還他滋味多休辭飲有碧荷貯酒深似金荷解連環嶽園牡丹妬花風惡吹青隂漲却亂紅池閣駐媚景别有仙葩遍瓊甃小臺翠油疏箔舊日天香記曾繞玉奴絃索自長安路逺膩紫肥黃但譜東洛天漢霽虹似昨聽鵑聲度月春又寥寞散豔魄飛入江南轉湖渺山茫夢境難託萬疊花愁正困倚鈎闌斜角待攜尊醉歌醉舞勸花自落永遇樂緑隂清逼池亭潤浸山閣雲氣凝聚未有蟬前已無蝶後花事隨逝水西園支徑今朝重到半礙醉笻吟袂除非是鶯身瘦小暗中引雛穿去梅簷溜滴風來吹斷放得斜照一縷玉子敲枰香綃落剪聲度深幾許層層離恨淒迷如此㸃破謾煩輕絮應難認爭春舊館倚紅杏處花心動南塘元夕春入南塘粉梅花盈盈倚風微笑虹暈貫簾星毬攢巷遍地寶光交照湧金門外樓臺影參差􅒓西湖波渺莫天逺芙容萬朵是誰移到鬒鬢雙仙未老陪玳席佳賔暖香雲繞翠簨叩氷銀管噓霜瑞露滿鍾頻釂醉歸深院重歌舞雕盤轉珍珠紅小鳯洲栁絲絲淡煙弄曉金盞子秋思練月縈窗夢乍醒黃花翠竹庭館心字夜香消人孤另雙鶼被他羞看擬待告訴天公減秋聲一半無情雁正用恁時飛來呌雲尋伴猶記杏櫳暖銀燭下纖影缷佩驪春渦暈紅豆小鶯衣嫩珠痕淡印芳汗自從信誤青鸞想籠鶯停喚風刀快剪盡畫簷梧桐怎剪愁斷喜遷鶯暮春游絲纖弱謾著意絆春春難憑託水暖成紋雲晴生影芳草漸侵裙幄露添牡丹新豔風擺秋千閒索對此景動髙歌一曲何妨行樂行樂君聽取鶯囀緑窗也似來相約粉壁題詩香街走馬爭奈鬢絲輸却夢回晝長無事聊倚䦨干斜角翠深處看悠悠幾㸃楊花飛落又改前詞游絲纖弱謾著意絆春春難憑託水暖成紋雲晴生影雙燕又窺簾幕露添牡丹新豔風擺秋千閒索對此景動髙歌一曲何妨行樂行樂春正好無奈緑窗孤負敲棊約錦幄調笙銀瓶索酒爭奈也曾迷著自從髮凋心倦常倚釣䦨斜角翠深處看悠悠幾㸃楊花飛落晝錦堂荷花染栁煙消敲菰雨斷歷歷猶寄斜陽掩冉玉妃芳袂擁出靈場倩他鴛鴦來寄語駐君舴艋亦何妨漁榔靜獨奏櫂歌邀妃試酌清觴湖上雲漸暝秋浩蕩鮮風支盡蟬糧贈我非環非佩萬斛生香半蝸茆屋歸雲影數螺苔石壓波光鴛鴦笑何似且留雙楫翠隱紅藏水龍吟效稼軒體招落梅魂醉兮瓊瀣浮觴些招兮遣巫陽些君毋去此颶風將起天微黃些野馬塵埃汚君楚楚白霓裳些駕空兮雲浪茫洋東下流君往他方些月滿兮西廂些呌雲兮笛淒涼些歸來兮為我重倚蛟背寒鱗蒼些俯視春紅浩然一笑吐幽香些翠禽兮弄曉招君未至我心傷些瑞鶴仙紅葉縞霜飛霽雪漸翠減涼痕猩浮寒血山窗夢淒切短吟笻猶倚鶯邊新樾花魂未歇似追惜芳消豔滅挽西風再入柔柯誤染紺雲成纈休說深題錦翰淺泛瓊漪暗春曾泄情條萬結依然是未愁絶最憐他南苑空階堆遍人隔仙蓬怨别鎖芙容小殿秋深碎蛩訴月又鄉城見月紺煙迷雁迹漸斷鼓零鐘街喧初息風檠背寒壁放氷蜍飛到絲絲簾隙瓊魂暗泣念鄉關霜蕪似織謾將身化鶴歸來忘却舊逰端的歡極蓬壺蕖浸花院梨溶醉連春夕柯雲罷奕櫻桃在夢難覓勸清光乍可幽窗相伴休照紅樓夜笛怕人間換譜伊涼素娥未識又夀東軒立冬前一日玉霜生穗也渺洲雲翠痕雁繩低也層簾四垂也錦堂寒早近開爐時也香風遞也是東籬花深處也料此花伴我仙翁未肯放秋歸也嬉也繒波穩舫鏡月危樓釂瓊􅋳也籠鶯睡也紅粧旋舞衣也待紗燈客散紗窗月上便是嚴凝序也換青氊小帳圍春又還醉也又買妾名雪香素肌元是雪向雪裏帶香更添奇絶梅花太孤潔問梨花何似風標難說長洲漾楫料鴛邊嬌蓉乍折對珠籠自剪涼衣愛把淡羅輕疊清徹螺心翠靨龍吻瓊涎總成虛設微微醉纈窗燈暈弄明滅算銀臺高處芳菲仙佩步遍纖雲萬葉覺來時人在紅幬半廊界月木蘭花慢氷傍池䦨倚遍問山影是誰偷但鷺斂瓊絲鴛藏繡羽礙浴妨浮寒流暗衝片響似犀椎帶月靜敲秋因念涼荷院宇粉丸曾泛金甌粧樓曉澀翠罌油倦鬢理還休更有何意緒憐他半夜瓶破梅愁紅裯淚乾萬㸃待穿來寄與薄情收只恐東風未轉誤人日望歸舟又再賦前題渺琉璃萬頃冷光射夕陽洲見敗栁漂枝殘蘆泛葉欲去仍留羅幬少年夢裏正窺簾月浸素肌柔誰念衰翁自老斷髭凍得成虬凝眸一望絶飛鷗宇宙正清幽謾細敲紫硯輕呵翠管吟思難抽颼颼晚風又起但時聽碎玉落簷頭多少梅花片腦醉來誤整香篝珍珠簾夀嶽君選書樓四面筠簾捲微薰起翠弄懸纖絲軟樓上讀書仙對寶狻霏轉繡館叉行雲度影灩夀􅘑盈盈爭勸爭勸奈藝邊事切花中情淺金奏未響昏蜩早傳言放却舞衫歌扇栁雨一窩涼再展開湘卷萬顆蕖心瓊珠輥細滴與銀朱小硯深院待月滿廊腰玉笙又逺高陽臺芙容霞鑠簾珠雲蒸篆玉環樓婉婉飛鈴天上王郎飈輪此地曾停秋香不斷臺隍逺溢萬叢錦豔鮮明事成塵鸞鳯簫中空度歌聲臞翁一㸃清寒性慣飱英菊嶼飲露蘭汀透屋髙紅新營小樣花城霜濃月淡三更夢夢曼仙來倚吟屏共襟期不是瓊姬不是芳卿又送翠英燕捲晴絲蜂黏落絮天教綰住閒愁閒裏清明囱囱粉澀紅羞燈搖縹暈茸窗冷語未闌娥影分收好傷情春也難留人也難留芳塵滿目總悠悠問縈雲珮響還繞誰樓别酒才斟從前心事都休飛鶯縱有風吹轉奈舊家苑已成秋莫思量楊栁灣西且櫂吟舟又閙元宵橋尾星沉街心塵斂天公還把春饒桂月黃昏金絲栁換星搖相逢小曲方嫌冷便暖薰珠絡香飄却憐他隔嵗芳期枉費囊綃人情終似娥兒舞到頻翻宿粉怎比初描認得游蹤花驄不住嘶驕梅梢一寸殘紅炬喜尚堪移照櫻桃醉醺醺不記元宵只道花朝春夏兩相期夀謝令人聽深深謝家庭館東風對語雙燕似說朝來天上婺星光現金裁花誥紫泥香繡裹藤輿紅茵軟散蠟宫輝行鱗厨品至今人羡西湖萬栁如線料月仙當此小停飈輦付與長年教見海心波淺縈雲玉佩五侯門洗雲華洞三春苑慢拍調鶯急鼓催鸞翠隂生院念奴嬌夀薛稼堂稼翁居士有幾多抱負幾多聲價玉立繡衣霄漢表曾覽八州風化進退行藏此時正要一著髙天下黃埃撲面不成也控羸馬人道雲出無心才離山後豈是無心者自古達官酣富貴往往遭人描畫只有青門種瓜閒客千載傳佳話稼翁一笑吾今亦愛吾稼絳都春春愁春愁怎畫正鶯桃帶緑酴醿花謝細雨院深淡月廊斜重簾挂歸時記約燒燈夜早拆盡秋千紅架縱然歸近風光又是翠隂初夏婭姹嚬青泫白恨玉珮罷舞芳塵凝榭幾擬倩人付與蘭香秋羅帕知他墮策斜籠馬在底處垂楊樓下無言暗擁嬌鬟鳯叉溜也聲聲慢秋聲黃花深巷紅葉低窗淒涼一片秋聲豆雨聲來中間夾帶風聲疏疏二十五㸃麗譙門不鎖更聲故人逺問誰搖玉珮簷底鈴聲彩角聲吹月墮漸連營馬動四起笳聲閃爍鄰燈燈前尚有砧聲知他訴愁到曉碎噥噥多少蛩聲訴未了把一半分與㕍聲尾犯寒夜夜倚讀書床敲碎唾壺燈暈明滅多事西風把亝鈴頻掣人共語溫溫芋火㕍孤飛蕭蕭蘆雪遍䦨干外萬頃魚天未了豫愁絶雞邊長劒舞念不到此樣豪傑瘦骨稜稜但淒其衾鐵是非夢無痕堪記似雙瞳繽紛翠纈浩然心在我逢著梅花便說滿江紅一掬鄉心付杳杳露莎煙葦來相伴淒然客影謝他窮鬼新緑舊紅春又老少𤣥老白人生幾况無情世故蕩摩中凋英偉詞場筆行羣蟻戰場胄藏羣蟻問如何清晝倚藤憑棐流水青山屋上下束書壺酒船頭尾任垂涎斗大印黃金狂周顗又秋旅秋本無愁奈客裏秋偏岑寂身老大歡敲秦缶懶移陶甓萬誤曾因疏處起一閒且向貧中覓笑新來多事是征鴻聲嘹嚦雙戶掩孤燈剔書束架琴懸壁笑人間無此小窗幽閴浪逺微聽葭葉響雨殘細數梧梢滴正依稀夢到故人家誰橫笛探芳信菊醉吟嘯似有人黃裳孤竚塵表漸老侵芳歲識君恨不早料應陶令吟魂在凝此秋香妙傲霜姿尚想前身倚窗餘傲回首醉年少控駿馬花邊紅軃茸帽淡泊東籬有誰肯夢飛到正襟三誦悠然句聊遣花微笑酒休賖醒眼看花正好梅花引荆溪阻雪花或作江城梅引白鷗問我泊孤舟是身留是心留心若留時何事鎖眉頭風拍小簾燈暈舞對閒影冷清清憶舊遊憶舊遊舊遊今在不花外樓栁下舟夢也夢也夢不到寒水空流漠漠黃雲溼透木綿裘都道無人愁似我今夜雪有梅花似我愁洞仙歌對雨思友世間何處最難忘杯酒唯是停雲想親友此時無一盞千種離愁西風外長伴枯荷衰栁去年深夜語傾倒書忩短燭心懸小紅豆記得到門時雨正蕭蕭嗟今雨此情非舊待與子相期采黃花又未卜重陽果能晴否又栁枝枝葉葉受東風調弄便是鶯穿也微動自鵝黃千縷數到飛綿閒無事誰管將春迎送輕柔心性在教得遊人酒舞花吟恣狂縱更誰家鸞鏡裏貪學纖蛾移來傍粧樓新種總不道江頭鎖清愁正雨渺煙茫翠隂如夢最髙樓催春新春景明媚在何時宜早不宜遲軟塵巷陌青油幰重簾深院畫羅衣要些兒晴日照暖風吹一片片雪兒休要下一㸃㸃雨兒休要灑才恁地越愆期悠悠不趂梅花到囱囱枉帶栁花飛倩黃鶯將我話報春歸祝英臺次韵栁邊樓花下館低捲繡簾半簾外天絲擾擾似情亂知他蛾緑纖眉鵝黃小袖在何處閒遊閒玩最堪嘆箏面一寸塵深玉柱網斜雁譜字紅鸞剪燭記同看幾回傳語東風將愁吹去怎奈向東風不管風入松戲人去妾東風方到舊桃枝仙夢已雲迷畫䦨紅子樗蒲處依然是春晝簾垂恨殺河東獅子驚回海底鷗兒尋芳小步莫嫌遲此去却慵移斷腸不在分襟後元來在襟未分時栁岸猶攜素手蘭房早掩朱扉解珮令春春晴也好春隂也好著些兒春雨越好春雨如絲繡出花枝紅裊怎禁他孟婆合皂梅花風小杏花風小海棠風驀地寒峭嵗歲春光被二十四風吹老楝花風爾且慢到一剪梅宿龍游朱氏樓小巧樓臺眼界寬朝卷簾看莫卷簾看故鄉一望一心酸雲又迷漫水又迷漫天不教人客夢安昨夜春寒今夜春寒梨花月底兩眉攢敲遍闌干拍遍䦨干又舟過吳江一片春愁待酒澆江上舟搖樓上帘招秋娘度與泰娘嬌風又飄飄雨又蕭簫何日歸家洗客袍銀字笙調心字香燒流光容易把人拋紅了櫻桃緑了芭蕉唐多令夀東軒秋碧瀉晴灣樓臺雲影閒記仙家元在蓬山飛到雁峯塵更少三萬頃玉無邊金盞倒垂蓮歌搖香霧鬟任芙容月轉朱䦨天氣已涼猶未冷重九後小春前栁梢青感舊小飲微吟殘燈斷雨靜戶幽窗幾度花開幾番花謝又到昏黃潘娘不是潘郎料應也霜黏鬢傍鸚鵡闌空鴛鴦壺破煙渺雲茫阮郎歸客中思馬跡山雪飛燈背雁聲低寒生紅被池小屏風畔立多時閒看番馬兒新搵淚舊題詩一般羅帶垂瓊簫夜夜挾愁吹梅花知不知金蕉葉秋夜不寐雲褰翠幕滿天星碎珠迸索孤蟾䦨外照我看看過轉角酒醒寒砧正作待眠來夢魂怕惡枕屏那更畫了平沙斷雁落小重山晴浦溶溶明斷霞樓臺搖影處是誰家銀紅裙襇皺宫紗風前坐閒鬬鬱金芽人散樹啼鴉粉團黏不住舊繁華雙龍尾上月痕斜而今照冷淡白菱花又曾伴芳卿鏘珮環西風吹夢斷墮人寰假饒無分入雕䦨窺粧鏡也令小溪灣此地有誰憐斜陽半卧處牧童攀勸花休苦恨天慳從來道薄命是朱顔白苧正春晴又春冷雲低欲落瓊苞未剖早是東風作惡旋安排一雙銀蒜鎮羅幕幽壑水生漪皺嫩緑潛鱗初躍愔愔門巷桃樹紅才約略知甚時霽華烘破青青萼憶昨引蝶花邊近來重見身學垂楊瘦削問小翠眉山為誰攢却斜陽杜宇任蛛絲罥遍玉箏絃索戶外惟聞放剪刀聲深在粧閣料想裁縫白苧春衫薄蝶戀花風蓮我愛荷花花最軟錦拶雲挨朵朵嬌如顫一陳微風來自逺紅低欲蘸涼波淺莫是羊家張靜婉抱月飄煙舞得腰肢倦偷把翠羅香被展無眠却又頻翻轉虞美人梳樓絲絲楊栁絲絲雨春在溟濛處樓兒忒小不藏愁幾度和雲飛去覓歸舟天憐客子鄉關逺借與花消遣海棠紅近緑䦨干才卷朱簾却又晚風寒又聽雨少年聽雨歌樓上紅燭昏羅帳壯年聽雨客舟中江闊雲低斷雁呌西風而今聽雨僧廬下鬢已星星也悲歡離合總無情一任階前㸃滴到天明南鄉子泊雁小汀洲冷淡湔裙水浸秋裙上唾花無覓處重游隔栁惟存月半鈎凖擬架層樓望得伊家見始休還怕粉雲天末起悠悠化作相思一片愁又塘門元宵翠􅎻夜游車不到山邊與水涯隨分紙燈三四盞鄰家便做元宵好景誇誰解倚梅花思想燈毬墜絳紗舊說夢華猶未了堪嗟才百餘年又夢華步蟾宫木犀緑華剪碎嬌雲瘦賸粧㸃菊前蓉後涓涓月也染成香又何況纖羅襟袖秋窗一夜西風驟翠奩鎖瓊珠花鏤人間富貴總浮雲且和露攀花三嗅又春景玉窗掣鎖香雲漲喚緑袖低敲方響流蘇拂處字微訛但斜倚紅梅一晌濛濛月在簾衣上做池館春隂模樣春隂模樣不如晴這催雪曲兒休唱玉樓春桃花灣馬跡秦人占得桃源地說道花深堪避世桃花灣內豈無花吕政馬來攔不住明朝與子穿花去去看霜蹄剜石處茫茫秦事是耶非萬一問花花解語戀繡衾蒨金小袖花下行過橋亭倚樹聽鶯被栁線低縈鬢紺雲垂叉鳯半橫紅薇影轉晴窗盡漾蘭心未到繡屏奈一㸃春恨在青娥彎處又生浪淘沙夜景人愛曉粧鮮我愛粧殘翠叉扶住欲欹鬟印了夜香無事也月上涼天新譜學筝難愁湧蛾灣一床衾浪未紅翻聽得人催佯不采去洗珠鈿又重九明露浴疏桐秋滿簾櫳掩琴無語意忡忡搯破東窗窺皓月早上芙容前事渺茫中煙水孤鴻一尊重九又成空不解吹愁吹帽落恨殺西風燕歸梁風蓮我夢唐宫春晝遲正舞到曵裙時翠雲隊仗絳霞衣慢騰騰手雙垂忽然急鼓催將起似綵鳯亂驚飛夢回不見萬瓊妃見荷花被風吹步蟾宫中秋去年雲掩氷輪皎喜今歲微隂俱掃乾坤一片玉琉璃怎算得清光多少無歌無酒癡頑老對愁影翻嫌分曉天公元不負中秋我自把中秋誤了南鄉子黃葵冷淡是秋花更比秋花冷淡些到處芙蓉供醉賞從他自有幽人處士誇寂莫兩三葩晝日無風也帶斜一片西窗殘照裏誰家捲却湘裙薄薄紗行香子舟宿蕳灣紅了櫻桃緑了芭蕉送春歸客尚蓬飄昨宵穀水今夜蘭臯奈雲溶溶風淡淡雨瀟瀟銀字笙調心字香燒料芳踪乍整還凋待將春恨都付春潮過窈娘堤秋娘渡泰娘橋粉蝶兒殘春啼鴂聲中春光化成春夢問東君仗誰將送燕憐晴鶯愛暖一窗方閧奈囱囱催他栁綿狂縱輕羅小扇桐花又飛么鳯記寒吟沁梅霜凍古今來人易老莫閒雙鞚尚堪遊荼䕷粉雲香洞翠羽吟紺露濃映素空樓觀峭玲瓏粉凍霽英冷光搖蕩古青松半規黃昏淡月梅氣山影溟濛有麗人步依修竹瀟然態若游龍綃袂微皺水溶溶仙莖清瀣淨洗斜紅勸我浮香桂酒環珮暗解聲飛芳靄中弄春弱栁垂絲慢按翠舞嬌童醉不知何處驚剪剪淒緊霜風夢醒尋痕訪蹤但留殘月掛蒼穹梅花未老翠羽雙吟一片曉峯賀新郎鄉士以狂得罪賦此餞行甚矣君狂矣想胸中些兒磊磈酒澆不去據我看來何所似一似韓家五鬼又一似楊家風子怪鳥啾啾鳴未了被天公捉在樊籠裏這一錯鐵難鑄濯溪雨漲荆溪水送君歸斬蛟橋外水光清處世上恨無樓百尺裝著許多俊氣做㺯得栖栖如此臨别贈言朋友事有殷勤六字君聽取節飲食慎言語又贈彈琵琶者妾有琵琶譜抱金槽慢撚輕攏栁梢鶯妬羽調六么彈遍了花底靈犀暗度奈敲斷玉叉纖股紙畫屏深朱戶掩捲西風滿地吹塵土芳事往蝶空訴天公把妾芳心誤小樓東隱約誰家鳯簫鼉鼓淚㸃染衫雙袖翠修竹淒其又莫背燈影蕭條情互捐佩洲前裙屐冷渺無邊一片相思苦春去也亂紅舞又題後院畫像緑墮雲垂領背琵琶盈盈裹手粉間紅靚依約春游歸來倦又似春眠未醒灩寒泚低迷蓉影鶯帶鬆聲飛過也栁窗深尚記停針聽魂浩蕩孤芳景金叉斷股瓶沉井問蘇城香銷卷子倩誰題詠燈暈青紅殘醉在小院屏昏帳暝誤嗔怪眉心慵整人道真真招得下任千呼萬喚無言應空對此淚花冷摸魚兒夀東軒軃吟鞭雁峰髙處曾游長夀仙府年年長見瑶簪㑹霞杪蓋芝輕度開繡户有萬朵芙容賸染秋光素清簫麗芳任灩玉杯深鸞酣鳯醉猶未洞天莫塵緣誤迷却桃源舊步飛瓊芳夢同賦朝來聞道仙童晏翹首翠房𤣥圃雲又霧身恍到微茫認得胎禽舞遙汀近浦便一葦漁航撑煙載雨歸去伴寒鷺沁園春夀嶽君舉昔裴晉公生甲辰歲秉唐相鈞向東都治第才娛老眼北門建節又絆閒身燠館花濃涼臺月淡不記弓刀千騎塵誰堪羡羡南塘居士做散仙人南塘水滿晴雲三百樹鳯洲楊栁春有緑衣奏曲金闕小雁綵衣勸酒玉跪雙麟前後同年逸勞異趨中立翻成雌甲辰斯言也是梅花說與竹里山民喜遷鶯金港阻風風濤如許被閒鷗誚我君行良苦槲葉深灣蘆窠窄港小憩倦篙慵櫓壯年夜吹笛去驚得魚龍嘷舞悵今老但篷窗緊掩荒涼愁愫别浦雲斷處低雁一繩攔斷家山路佩玉無詩飛霞乏序滿席快飈誰付醉中幾番重九合度芳尊孤負便晴否怕明朝蝶冷黃花秋圃又春晴晴天寥廓被孤雲畫出離愁消索玉局彈棊金叉剪燭芳思可勝搖落鏡粧為慵遲晚笙曲緣愁差錯倒纖指更從頭細數年時同樂寂寞花院悄昨夜醉眠夢也難憑託車角生時馬足方後才始斷伊漂泊悶無半分消遣春又一番擔閣倚䦨久奈東風忒冷紅綃單薄齊天樂元夜閲夢華録銀蟾飛到觚稜外娟娟下窺龍尾電紫鞘輕雲紅筤曲雕玉輿穿燈底峰繒岫綺沸一簇人聲道隨竿媚侍女迎鑾燕嬌鶯姹炫珠翠華胥仙夢未了被天公澒洞吹換塵世淡栁湖山濃花巷陌惟說錢塘而已回頭汴水望當日宸遊萬里發處但有寒蕪夜深青燐起念奴嬌夢有奏方響而舞者夜深清夢到叢華深處滿襟氷雪人在璚雲方響樂杳杳衝牙清絶翠簨翔龍金樅躍鳯不是㽔賔鐵淒鏘仙調風敲珠樹新折中有五色光開參差披影對舞仙香徹霧閣雲窗歸去也笑擁靈君旌節六曲䦨干一聲鸚鵡霍地花空滅夢回孤館秋笳霜外嗚咽應天長次清真韵栁湖載酒梅墅賖棊東風袖裏寒色轉翠籠池閣含櫻薦鶯食囱囱過春是客㺯細雨晝隂生寂似瓊花滴下紅裳再返仙籍無限倚䦨愁夢斷雲簫鵑呌度青壁漫有戲龍盤盈盈住花宅驕驄馬嘶巷陌户半掩墮鞭無迹但追想白苧裁縫燈下初識賀新郎櫽栝松詩絶代幽人獨掩芳姿深居何處亂雲深谷自說關中良家子零落聊依草木世喪敗誰收骨肉輕薄兒郎為夫壻愛新人窈窕顔如玉千萬事風前燭鴛鴦一旦成孤宿最堪憐新人歡笑舊人哀哭侍婢賣珠回來後相與牽蘿補屋謾采得柏枝盈掬日莫山中天寒也翠綃衣薄甚肌生粟空斂袖倚修竹玉漏遲夀東軒客窗空翠杪前生飲慣長生瓊醥回首紅塵換了闕花􅎻草隔水神仙洞府但只有飛霞能到誰信道西風送我還陪清嘯縹眇栁側䨥樓正繡幕圍春露深煙悄魚尾傍時雪上鬒雲猶少醉傍芙容目語願來此年年簮帽青嶼小鶴立淡煙秋曉又傅巖叟初如武林納浴堂徐氏女子于客樓其歸也亦貯之所居樓上而圖西湖景于樓壁翠鴛雙穗冷鶯聲喚轉春風芳景花湧袖香此度徐粧偏稱水月仙人院宇到處有西湖如鏡煙岫暝纖蔥誤指蓮峰篁嶺料想小閣初逢正浪拍紅猊袖飛金餅樓倚斜暉賸把佳期重省萬種惺忪笑語一㸃溫柔情性叉倦整盈盈背燈嬌影髙陽臺江隂道中有懷宛轉憐香徘徊顧影臨分更倚苔身多謝殘英飛來逺逺隨人回頭却望晴簷下等幾番小摘微薰到而今獨裊鞭梢笑不成春愁吟未了煙林曉有垂楊夾路也為輕顰今夜山窗還應夢繞梨雲行囊不是吳箋少問倩誰去寫花真待歸時葉底紅肥細雨如塵探春令春怨玉窗蠅字記春寒滿茸絲紅處畫翠鴛雙展金蜩翅未抵我愁紅膩芳心一㸃天涯去絮濛濛遮住對花彈阮纖瓊指為粉靨空彈淚秋夜雨秋雨黃雲水驛秋笳咽吹人雙鬢如雪愁多無奈處謾碎把寒花輕撧紅雲轉入香心裏夜漸深人語初歇此際愁更别雁落影西窗殘月又春冬蔣正夫令作春夏各一闋次前韵金衣露溼鶯喉咽春情不解分雪寶箏絃斷盡但萬縷閒愁難撧長紅小白誰亭館過禁煙彈指芳歇今夜休要别且醉宿緗桃花月又夏髹車轉急風吹咽氷絲鬆藕新雪有人涼滿袖怕汗溼紅綃猶撧三更夢斷敲荷雨細聽來疏㸃還歇茉莉標致别占斷了紗㡡香月又冬紅麟不暖瓶笙咽爐灰一片晴雪醉無香嗅醒但手把新橙閒撧更深凍損梅花也聽畫堂簫鼓方歇想是天氣别豫借與春風三月少年遊春思梨邊風緊雪難晴千㸃照溪明吹絮簾低唾茸窗小人隔翠隂行而今白鳥橫飛處煙樹渺鄉城兩袖春寒一襟春恨斜日淡無情又秋思楓林紅透晚煙青客思滿鷗汀二十年來無家種竹猶借竹為名春風未了秋風到老去萬緣輕只把平生閒吟閒詠譜作櫂歌聲栁梢青游女達或刻蔣學唱新腔秋千架上叉股敲雙栁雨花風翠鬆裙褶紅膩鞋幫歸來門掩銀釭淡月裏疏鐘漸撞嬌欲人扶醉嫌人問斜倚樓窗霜天曉角折花人影窗紗是誰來折花折則從他折去知折去向誰家簷牙枝最佳折時髙折些說與折花人道須插向鬢邊斜如夢令村景夜月溪篁鸞影曉露巖花鶴頂半世踏紅塵到底輸他村景村景村景樵斧耕蓑漁艇竹山詞
