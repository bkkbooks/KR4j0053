body:
  text: 竹山詞詞曲類一詞集之屬提要臣等謹案竹山詞一巻宋蔣捷撰捷字勝欲自號竹山宜興人徳祐中嘗登進士宋亡之後遁跡不仕以終是編為毛晉汲古閣所刋巻首載至正乙已湖濵散人題詞謂此稿得之唐士牧家雖無銓次已無遺逸當猶元人所傳之舊本矣其詞練字精深調音諧暢為倚聲家之榘矱間有故作狡獪者如水龍吟招落梅魂一闋通首住句用㱔字瑞鶴仙夀東軒一闋通首住句用也字而於虛字之上仍然叶韻葢偶用詩騷之格非若黄庭堅趙長卿輩之全不用叶竟成散體者比也他如應天長一闋注云次清真韻前半闋轉翠龍池闊句止五字而考周邦彦詞作止是夜堂無月實六字句後半闋澷有戲龍盤句亦五字而考周詞又見漢宫傳燭實亦六字此必刋本各有脱字至於沁園春絶勝珠簾十里樓句樓字上譌增迷字玉樓春明朝與子穿花去句花字譌作不字行香子奈雲溶溶句奈字下譌增何字粉蝶兒古今来人易老句譌脱一来字翠羽吟但留殘月掛蒼穹句譌脱月蒼二字皆為疎舛唐多令之訛為糖多尤足嗢噱其喜遷鶯調所載改本一闋視元詞殊減風韻似非捷所自定詞統譏之甚當但指為史達祖詞則又誤記耳乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀題竹山詞竹山先生出義興鉅族宋南渡後有名㻧字宣卿者善書仕亦通顯子孫俊秀所居擅溪山之勝故先生貎不揚長於樂府此稿得之於唐士牧家蔵本雖無詮次庶幾無遺逸云至正乙已嵗次秋七月十有七日湖濵散人題
