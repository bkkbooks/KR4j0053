body:
  text: 竹山詞詞曲類一詞集之屬提要臣等謹案竹山詞一卷宋蔣捷撰捷字勝欲自號竹山宜興人德祐中嘗登進士宋亡之後遁迹不仕以終是編為毛晉汲古閣所刋卷首載至正乙已湖濵散人題詞謂此稿得之唐士牧家雖無銓次已無遺逸當猶元人所傳之舊本矣其詞練字精深調音諧暢為倚聲家之矩矱間有故作狡獪者如水龍吟招落梅魂一闋通首住句用些字瑞鶴仙夀東軒一闋通首住句用也字而於虛字之上仍然叶韻蓋偶用詩騷之格非若黃庭堅趙長卿輩之全不用叶竟成散體者比也他如應天長一闋注云次清真韻前半闋轉翠龍池闊句止五字而考周邦彥詞作止是夜堂無月實六字句後半闋漫有戲龍盤句亦五字而考周詞又見漢宫傳燭實亦六字此必刋本各有脫字至於沁園春絶勝珠簾十里樓句樓字上訛增迷字玉樓春明朝與子穿花去句花字訛作不字行香子奈雲溶溶句奈字下訛增何字粉蝶兒古今來人易老句訛脫一來字翠羽吟但留殘月挂蒼穹句訛脫月蒼二字皆為疏舛唐多令之訛為糖多尤足嗢噱其喜遷鶯調所載改本一闋視元詞殊減風韻似非捷所自定詞統譏之甚當但指為史達祖詞則又誤記耳乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀題竹山詞竹山先生出義興巨族宋南渡後有名㻧字宣卿者善書仕亦通顯子孫俊秀所居擅溪山之勝故先生貌不揚長於樂府此稿得之於唐士牧家藏本雖無詮次庶幾無遺逸云至正乙已嵗次秋七月十有七日湖濵散人題
