body:
  text: 竹山詞跋昔人評詞盛稱李氏晏氏父子及耆卿子野子㳺子瞻美成堯章止矣蔣勝欲冺焉無聞今讀竹山詞一巻語語纎巧真世説靡也字字妍倩真六朝隃也豈其稍劣於諸公耶或讀招落梅魂一詞謂其磊落横放與辛㓜安同調其殆以一班而失全豹矣湖南毛晉識
